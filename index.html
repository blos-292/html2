<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Creative Media | Home</title>
    <link rel="stylesheet" href="style.css">
    <style>
        :root { --sage: #93a98f; --sand: #e5d3b3; --charcoal: #2d3436; }
        body { margin: 0; background: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        /* Navigation Consistency Fix */
        nav { width: 100%; padding: 40px 0; background: #fff; position: sticky; top: 0; z-index: 1000; }
        .nav-container { display: flex; justify-content: space-between; align-items: center; padding: 0 5%; }
        nav ul { display: flex; gap: 40px; list-style: none; margin: 0; padding: 0; }
        nav ul li a { text-decoration: none; color: var(--charcoal); font-weight: 700; letter-spacing: 2px; font-size: 0.75rem; text-transform: uppercase; transition: color 0.3s; }
        nav ul li a:hover, nav ul li a.active { color: var(--sage); }

        /* Slideshow Styles */
        .slideshow-container {
            position: relative;
            width: 90%;
            height: 85vh;
            margin: 2vh auto;
            overflow: hidden;
            border-radius: 4px;
            background: #f9f9f9;
        }
        .mySlides {
            width: 100%;
            height: 100%;
            object-fit: cover;
            position: absolute;
            transition: opacity 1.5s ease-in-out;
            opacity: 0;
            top: 0;
            left: 0;
        }
        .active-slide { opacity: 1; }

        .hero-overlay {
            position: absolute;
            bottom: 10%;
            left: 5%;
            z-index: 10;
            color: white;
            text-shadow: 0 4px 15px rgba(0,0,0,0.3);
            pointer-events: none;
        }

        @media (max-width: 900px) {
            .nav-container { flex-direction: column; gap: 20px; }
            .slideshow-container { height: 60vh; width: 95%; }
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-container">
        <div class="logo"><strong>CREATIVE</strong>MEDIA</div>
        <ul>
            <li><a href="index.html" class="active">Home</a></li>
            <li><a href="photography.html">Photography</a></li>
            <li><a href="design.html">Design</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>
    </div>
</nav>

<main>
    <section class="slideshow-container">
        <img class="mySlides active-slide" src="sun.jpg" alt="Slide 1">
        <img class="mySlides" src="pon.jpg" alt="Slide 2">
        <img class="mySlides" src="fb.jpg" alt="Slide 3">
        <img class="mySlides" src="con.jpg" alt="Slide 4">
        <img class="mySlides" src="mon.jpg" alt="Slide 5">

        <div class="hero-overlay">
            <span style="letter-spacing: 5px; text-transform: uppercase; font-size: 0.8rem;">Portfolio v.26</span>
            <h1 style="font-size: clamp(3rem, 10vw, 8rem); margin: 10px 0; line-height: 0.9;">Visual<br>Direction</h1>
        </div>
    </section>
</main>

<script>
    let index = 0;
    const slides = document.querySelectorAll(".mySlides");
    
    function rotate() {
        if (slides.length === 0) return;
        
        slides[index].classList.remove("active-slide");
        index = (index + 1) % slides.length;
        slides[index].classList.add("active-slide");
        
        setTimeout(rotate, 4500);
    }
    
    // Start the rotation
    setTimeout(rotate, 4500);
</script>
</body>
</html>
